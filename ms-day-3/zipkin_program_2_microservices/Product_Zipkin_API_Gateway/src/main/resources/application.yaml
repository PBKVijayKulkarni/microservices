server:
  port: 8080

spring:
  application:
    name: Product_Zipkin_API_Gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/user/**

        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/product/**

        - id: billing-service
          uri: lb://BILLING-SERVICE
          predicates:
            - Path=/billing/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka